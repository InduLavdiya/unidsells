<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Budget Filter – UnidSells</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .bwrap{max-width:900px;margin:0 auto;padding:36px 40px}
    .budget-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:30px}
    .range-slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none}
    .range-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:var(--shadow-gold)}
    @media(max-width:768px){.bwrap{padding:18px}}
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="logo" onclick="location.href='/'">Unid<span>Sells</span></div>
    <div class="nav-actions"><button class="btn btn-ghost btn-sm" onclick="location.href='/'">← Home</button></div>
  </nav>
  <div style="background:var(--dark);padding:22px 40px 18px">
    <h1 style="color:#fff;font-size:26px">💰 Budget Filter</h1>
    <p style="color:rgba(255,255,255,.45);font-size:13px;margin-top:4px">Find items that fit your budget perfectly</p>
  </div>
  <div class="bwrap">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:14px">Quick Select</div>
    <div class="budget-grid">
      <div class="budget-card" onclick="quickSelect(0,500,this)"><div style="font-size:28px;margin-bottom:8px">🪙</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">Under ₹500</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Great bargains</div></div>
      <div class="budget-card" onclick="quickSelect(500,2000,this)"><div style="font-size:28px;margin-bottom:8px">💵</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">₹500–₹2K</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Budget friendly</div></div>
      <div class="budget-card" onclick="quickSelect(2000,10000,this)"><div style="font-size:28px;margin-bottom:8px">💳</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">₹2K–₹10K</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Mid range</div></div>
      <div class="budget-card" onclick="quickSelect(10000,50000,this)"><div style="font-size:28px;margin-bottom:8px">💎</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">₹10K–₹50K</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Premium</div></div>
      <div class="budget-card" onclick="quickSelect(50000,200000,this)"><div style="font-size:28px;margin-bottom:8px">🏆</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">₹50K–₹2L</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">High value</div></div>
      <div class="budget-card" onclick="quickSelect(200000,9999999,this)"><div style="font-size:28px;margin-bottom:8px">👑</div><div style="font-family:'Playfair Display',serif;font-weight:700;color:var(--gold);font-size:17px">Above ₹2L</div><div style="font-size:12px;color:var(--text-muted);margin-top:4px">Luxury</div></div>
    </div>

    <div style="background:#fff;border-radius:var(--r);padding:28px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border)">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted);margin-bottom:18px">Custom Range</div>
      <div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">
        <div style="flex:1;min-width:120px">
          <label class="form-label">Min (₹)</label>
          <input type="number" id="min-p" class="form-input" placeholder="0" min="0">
        </div>
        <div style="color:var(--text-muted);align-self:flex-end;margin-bottom:14px;font-size:20px">—</div>
        <div style="flex:1;min-width:120px">
          <label class="form-label">Max (₹)</label>
          <input type="number" id="max-p" class="form-input" placeholder="Any">
        </div>
      </div>
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-bottom:10px">
          <span>₹0</span>
          <span id="slider-lbl" style="color:var(--gold);font-weight:700">₹50,000</span>
          <span>₹10L</span>
        </div>
        <input type="range" id="price-range" class="range-slider" min="0" max="1000000" step="500" value="50000" oninput="sliderMove(this)">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Category (optional)</label>
        <select id="bud-cat" class="form-input">
          <option value="">All Categories</option>
          <option>Electronics</option><option>Vehicles</option><option>Furniture</option>
          <option>Fashion</option><option>Books</option><option>Sports</option>
          <option>Home & Garden</option><option>Jobs</option><option>Services</option><option>Other</option>
        </select>
      </div>
    </div>

    <button class="btn btn-gold btn-full" onclick="search()" style="padding:15px;font-size:15px;margin-bottom:28px">🔍 Find Items in My Budget</button>
    <div id="results"></div>
  </div>
  <div id="bottom-nav"></div>
  <div class="toast-container"></div>
  <script src="/app.js"></script>
  <script>
    const user = Auth.require(); if (!user) throw 0;
    renderBottomNav('');
    function sliderMove(el) {
      document.getElementById('slider-lbl').textContent = fmt(el.value);
      document.getElementById('max-p').value = el.value;
    }
    function quickSelect(mn, mx, el) {
      document.querySelectorAll('.budget-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('min-p').value = mn;
      document.getElementById('max-p').value = mx === 9999999 ? '' : mx;
      search();
    }
    async function search() {
      const mn = document.getElementById('min-p').value || 0;
      const mx = document.getElementById('max-p').value || 9999999;
      const cat = document.getElementById('bud-cat').value;
      const c = document.getElementById('results');
      c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
      try {
        let url = '/listings?minPrice=' + mn + '&maxPrice=' + mx;
        if (cat) url += '&category=' + encodeURIComponent(cat);
        const listings = await apiFetch(url);
        if (!listings.length) {
          c.innerHTML = '<div class="empty-state"><div class="icon">💸</div><h3>No items in this budget</h3><p>Try adjusting your price range</p></div>'; return;
        }
        const wl = Wishlist.get();
        c.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="font-size:18px">${listings.length} items found</h3>
          <span style="font-size:13px;color:var(--text-muted)">${fmt(mn)} – ${mx>=9999999?'No limit':fmt(mx)}</span>
        </div>
        <div class="products-grid" style="padding:0">${listings.map(l => renderProductCard(l, wl)).join('')}</div>`;
      } catch(e) { c.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h3>Error</h3><p>' + e.message + '</p></div>'; }
    }
  </script>
</body>
</html>
