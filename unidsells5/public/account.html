<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Account – UnidSells</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .profile-hero{background:linear-gradient(135deg,var(--dark) 0%,#1a1208 100%);padding:40px;position:relative;overflow:hidden}
    .profile-hero::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(200,151,58,.12) 0%,transparent 70%);top:-150px;right:-80px}
    .menu-group{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;border:1px solid var(--border)}
    .menu-item{display:flex;align-items:center;gap:15px;padding:17px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--tr)}
    .menu-item:last-child{border-bottom:none}
    .menu-item:hover{background:var(--bg)}
    .msec{max-width:680px;margin:0 auto;padding:26px 40px}
    @media(max-width:768px){.profile-hero{padding:26px 18px}.msec{padding:16px}}
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="logo" onclick="location.href='/'">Unid<span>Sells</span></div>
    <div class="nav-actions"><button class="btn btn-ghost btn-sm" onclick="location.href='/'">← Home</button></div>
  </nav>
  <div class="profile-hero" id="hero"></div>
  <div class="msec">
    <div class="menu-group">
      <div style="padding:12px 20px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)">Activity</div>
      <div class="menu-item" onclick="location.href='/myads.html'"><span style="font-size:20px">📦</span><span style="flex:1;font-weight:500">My Ads</span><span style="color:var(--text-muted)">›</span></div>
      <div class="menu-item" onclick="location.href='/wishlist.html'"><span style="font-size:20px">❤️</span><span style="flex:1;font-weight:500">Wishlist</span><span style="color:var(--text-muted)">›</span></div>
      <div class="menu-item" onclick="location.href='/chat-list.html'"><span style="font-size:20px">💬</span><span style="flex:1;font-weight:500">Messages</span><span style="color:var(--text-muted)">›</span></div>
      <div class="menu-item" onclick="location.href='/budget.html'"><span style="font-size:20px">💰</span><span style="flex:1;font-weight:500">Budget Filter</span><span style="color:var(--text-muted)">›</span></div>
    </div>
    <div class="menu-group">
      <div style="padding:12px 20px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text-muted)">Settings</div>
      <div class="menu-item" onclick="openEdit()"><span style="font-size:20px">✏️</span><span style="flex:1;font-weight:500">Edit Profile</span><span style="color:var(--text-muted)">›</span></div>
      <div class="menu-item" onclick="openPw()"><span style="font-size:20px">🔒</span><span style="flex:1;font-weight:500">Change Password</span><span style="color:var(--text-muted)">›</span></div>
      <div id="admin-link" class="menu-item" onclick="location.href='/admin.html'" style="display:none"><span style="font-size:20px">👑</span><span style="flex:1;font-weight:500">Admin Panel</span><span class="tag tag-gold" style="font-size:11px;margin-right:6px">Admin</span><span style="color:var(--text-muted)">›</span></div>
    </div>
    <div class="menu-group">
      <div class="menu-item" onclick="Auth.logout()"><span style="font-size:20px">🚪</span><span style="flex:1;font-weight:600;color:var(--red)">Logout</span></div>
    </div>
  </div>
  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header"><h3>Edit Profile</h3><div class="modal-close" onclick="closeModal('edit-modal')">×</div></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="en" class="form-input"></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" id="ee" class="form-input"></div>
        <div class="form-group"><label class="form-label">Mobile</label><input type="tel" id="em" class="form-input"></div>
        <div class="form-group"><label class="form-label">Avatar URL (optional)</label><input type="url" id="ea" class="form-input" placeholder="https://..."></div>
        <button class="btn btn-gold btn-full" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>
  <!-- Password Modal -->
  <div class="modal-overlay" id="pw-modal">
    <div class="modal">
      <div class="modal-header"><h3>Change Password</h3><div class="modal-close" onclick="closeModal('pw-modal')">×</div></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" id="cp" class="form-input"></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" id="np" class="form-input"></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" id="cfp" class="form-input"></div>
        <button class="btn btn-gold btn-full" onclick="changePw()">Update Password</button>
      </div>
    </div>
  </div>
  <div id="bottom-nav"></div>
  <div class="toast-container"></div>
  <script src="/app.js"></script>
  <script>
    let user = Auth.require(); if (!user) throw 0;
    renderBottomNav('account');
    function renderHero() {
      document.getElementById('hero').innerHTML = `<div style="position:relative;z-index:1;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div class="avatar xl" style="background:${avatarColor(user.name)};border:3px solid rgba(200,151,58,.4)">${user.avatar?`<img src="${user.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">`:initials(user.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#fff">${user.name}</div>
          <div style="color:rgba(255,255,255,.5);font-size:14px;margin-top:4px">${user.email||user.mobile||'No contact info'}</div>
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
            ${user.role==='admin'?'<span class="tag tag-gold">👑 Admin</span>':''}
            ${user.blocked?'<span class="tag tag-red">🚫 Blocked</span>':'<span class="tag" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)">✅ Active Member</span>'}
          </div>
        </div>
        <button class="btn btn-sm" onclick="openEdit()" style="color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);align-self:flex-start">✏️ Edit</button>
      </div>`;
      if (Auth.isAdmin()) document.getElementById('admin-link').style.display = 'flex';
    }
    function openEdit() { document.getElementById('en').value=user.name||''; document.getElementById('ee').value=user.email||''; document.getElementById('em').value=user.mobile||''; document.getElementById('ea').value=user.avatar||''; document.getElementById('edit-modal').classList.add('show'); }
    function openPw() { document.getElementById('pw-modal').classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); }
    async function saveProfile() {
      const name=document.getElementById('en').value.trim();
      if (!name) return showToast('Name is required','error');
      try {
        const d=await apiFetch('/users/'+user._id,{method:'PUT',body:JSON.stringify({name,email:document.getElementById('ee').value.trim(),mobile:document.getElementById('em').value.trim(),avatar:document.getElementById('ea').value.trim()})});
        user=d.user; Auth.setUser(user); closeModal('edit-modal'); renderHero(); showToast('Profile updated! ✓','success');
      } catch(e){showToast(e.message,'error');}
    }
    async function changePw() {
      const curr=document.getElementById('cp').value, nw=document.getElementById('np').value, conf=document.getElementById('cfp').value;
      if(!curr||!nw) return showToast('All fields required','error');
      if(nw!==conf) return showToast('Passwords do not match','error');
      if(nw.length<6) return showToast('Min 6 characters','error');
      try {
        await apiFetch('/users/'+user._id+'/password',{method:'PUT',body:JSON.stringify({currentPassword:curr,newPassword:nw})});
        closeModal('pw-modal'); ['cp','np','cfp'].forEach(id=>document.getElementById(id).value=''); showToast('Password changed! ✓','success');
      } catch(e){showToast(e.message,'error');}
    }
    document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show')}));
    renderHero();
  </script>
</body>
</html>
